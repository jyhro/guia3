<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Mi Proyecto Web</title>

    <!-- CSS interno -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
        }

        h1 {
            color: blue;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Bienvenido a mi proyecto</h1>
    <p>Este es un ejemplo funcional con HTML, CSS y JavaScript en un solo archivo.</p>

    <button onclick="saludar()">Haz clic aquí</button>

    <!-- JavaScript interno -->
    <script>
        function saludar() {
            alert("¡Hola! JavaScript está funcionando correctamente.");
        }
    </script>

</body>
</html>
