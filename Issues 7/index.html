<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Mi Proyecto Web</title>

    <!-- CSS interno -->
    <style>
        /* 🔹 RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 🔹 TIPOGRAFÍA */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            line-height: 1.6;
        }

        /* 🔹 LAYOUT GENERAL */
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: blue;
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: blue;
            color: white;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bienvenido a mi proyecto</h1>
        <p>Este es un ejemplo funcional con HTML, CSS y JavaScript en un solo archivo.</p>

        <button onclick="saludar()">Haz clic aquí</button>
    </div>

    <!-- JavaScript interno -->
    <script>
        function saludar() {
            alert("¡Hola! JavaScript está funcionando correctamente.");
        }
    </script>

</body>
</html>
